<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AutoScanR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#071538',
              primary: '#0094b7',
              secondary: '#3B82F6',
              accent: '#F59E0B',
              surface: '#FFFFFF',
              beige: '#64748B',
              light: '#F8FAFC',
            }
          },
          fontFamily: {
            heading: ['RaceSport', 'Orbitron', 'sans-serif'],
            body: ['Poppins', 'sans-serif'],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'scan-line': 'scan-line 2s linear infinite',
            'shimmer': 'shimmer 2s infinite linear',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            'pulse-glow': {
              '0%, 100%': { opacity: '1', boxShadow: '0 0 20px rgba(0, 163, 255, 0.3)' },
              '50%': { opacity: '0.5', boxShadow: '0 0 10px rgba(0, 163, 255, 0.1)' },
            },
            shimmer: {
              '100%': { transform: 'translateX(100%)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --app-height: 100dvh;
    }

    body {
      background-color: #F8FAFC;
      color: #1E293B;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      /* Permet le défilement si nécessaire */
    }

    #root {
      height: 100%;
    }

    @font-face {
      font-family: 'RaceSport';
      src: url('/race_sport.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    .font-heading {
      font-family: 'RaceSport', 'Orbitron', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #F1F5F9;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 10px;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #E2E8F0;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .glass-button {
      background: white;
      border: 1px solid #E2E8F0;
      transition: all 0.2s ease;
    }

    .glass-button:hover {
      background: #F1F5F9;
      border-color: #CBD5E1;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "leaflet": "https://esm.sh/leaflet@^1.9.4",
    "react-leaflet": "https://esm.sh/react-leaflet@^4.2.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
